name: build

on:
  push:
    branches: [main, staging, prod]
  pull_request:
    branches: [main, staging, prod]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      sha8: ${{ steps.sha8.outputs.sha8 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set SHA8
        id: sha8
        run: echo "sha8=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine registry prefix
        id: registry
        run: |
          case "${GITHUB_REF_NAME}" in
            staging) echo "prefix=staging" >> "$GITHUB_OUTPUT" ;;
            prod)    echo "prefix=prod"    >> "$GITHUB_OUTPUT" ;;
            *)       echo "prefix=dev"     >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Log in to Zot
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: registry2.initiativeeconomics.dev:5443
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: registry2.initiativeeconomics.dev:5443/${{ steps.registry.outputs.prefix }}/populus-spec/web:${{ steps.sha8.outputs.sha8 }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Save digests artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.sha8.outputs.sha8 }}" > /tmp/digests/sha8.txt

      - name: Upload digests artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: image-digests
          path: /tmp/digests/
          retention-days: 1
